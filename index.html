<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動報名系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 隱藏原生 checkbox，用漂亮方塊替代 */
        .custom-check { display: none; }
        .custom-check:checked + .check-label {
            background-color: #4f46e5;
            color: white;
            border-color: #4f46e5;
            transform: scale(0.98);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex items-center justify-center">

    <div class="bg-white p-5 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <h2 class="text-xl font-bold text-center text-gray-800 mb-5">🎯 活動報名 (手機優化版)</h2>

        <div class="mb-5">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">1. 選擇您的組別</label>
            <div class="grid grid-cols-4 gap-2">
                <button type="button" onclick="selectGroup('花')" class="group-btn py-3 text-center bg-gray-50 hover:bg-indigo-50 text-gray-700 font-semibold rounded-xl border border-gray-200 transition-all text-sm">花</button>
                <button type="button" onclick="selectGroup('天')" class="group-btn py-3 text-center bg-gray-50 hover:bg-indigo-50 text-gray-700 font-semibold rounded-xl border border-gray-200 transition-all text-sm">天</button>
                <button type="button" onclick="selectGroup('草')" class="group-btn py-3 text-center bg-gray-50 hover:bg-indigo-50 text-gray-700 font-semibold rounded-xl border border-gray-200 transition-all text-sm">草</button>
                <button type="button" onclick="selectGroup('地')" class="group-btn py-3 text-center bg-gray-50 hover:bg-indigo-50 text-gray-700 font-semibold rounded-xl border border-gray-200 transition-all text-sm">地</button>
            </div>
        </div>

        <div id="stepAdult" class="mb-5 hidden">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">2. 勾選參加的大人 (可複選)</label>
            <div class="grid grid-cols-2 gap-2" id="adultContainer">
                </div>
        </div>

        <div id="stepChildren" class="mb-5 hidden">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">3. 勾選隨行的小孩 (可複選)</label>
            <div class="grid grid-cols-2 gap-2" id="childrenContainer">
                </div>
        </div>

        <div id="summarySection" class="mt-6 pt-4 border-t border-gray-100 hidden">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">本次報名名單：</label>
            <div id="finalOutput" class="p-3 bg-green-50 border border-green-200 text-green-800 rounded-xl text-sm font-bold min-h-[40px] flex items-center mb-4">
                尚未選擇成員
            </div>
            <button id="submitBtn" onclick="submitData()" class="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-xl shadow-lg hover:bg-indigo-700 active:scale-[0.98] transition-all text-sm">
                確認送出報名
            </button>
        </div>
    </div>

    <script>
        // 1. 核心資料結構：以「家庭」為單位，夫妻分開列在陣列中
        const dbData = [
            { familyId: "F1", group: "花", adults: ["大人a1", "大人b1"], children: ["小孩ab1-1", "小孩ab1-2"] },
            { familyId: "F2", group: "花", adults: ["大人a2", "大人b2"], children: ["小孩ab2-1", "小孩ab2-2"] },
            { familyId: "F3", group: "花", adults: ["大人a3", "大人b3"], children: ["小孩ab3-1", "小孩ab3-2", "小孩ab3-3"] },
			{ familyId: "F4", group: "花", adults: ["大人a4", "大人b4"], children: ["小孩ab4-1", "小孩ab4-2", "小孩ab4-3"] },
			{ familyId: "F5", group: "花", adults: ["大人a5", "大人b5"], children: ["小孩ab5-1", "小孩ab5-2", "小孩ab5-3"] },
			{ familyId: "F6", group: "花", adults: ["大人a6", "大人b6"], children: ["小孩ab6-1", "小孩ab6-2", "小孩ab6-3"] },
			{ familyId: "F7", group: "花", adults: ["大人a7", "大人b7"], children: ["小孩ab7-1", "小孩ab7-2", "小孩ab7-3"] },
			{ familyId: "F8", group: "花", adults: ["大人a8", "大人b8"], children: ["小孩ab8-1", "小孩ab8-2"] },
			{ familyId: "F9", group: "花", adults: ["大人a9", "大人b9"], children: ["小孩ab9-1", "小孩ab9-2"] },
			{ familyId: "F10", group: "花", adults: ["大人a10", "大人b10"], children: ["小孩ab10-1", "小孩ab10-2"] },
			{ familyId: "F11", group: "花", adults: ["大人a11", "大人b11"], children: ["小孩ab11-1", "小孩ab11-2"] },
			{ familyId: "F12", group: "花", adults: ["大人a12", "大人b12"], children: ["小孩ab12-1", "小孩ab12-2"] },
			{ familyId: "F13", group: "花", adults: ["大人a13", "大人b13"], children: ["小孩ab13-1", "小孩ab13-2"] },
			
            { familyId: "T1", group: "天", adults: ["大人c1", "大人d1"], children: ["小孩cd1-1", "小孩cd1-2"] },
            { familyId: "T2", group: "天", adults: ["大人c2", "大人d2"], children: ["小孩cd2-1", "小孩cd2-2"] },
			
            { familyId: "G1", group: "草", adults: ["大人e1", "大人f1"], children: ["小孩ef1-1", "小孩ef1-2"] },
			
			{ familyId: "L1", group: "地", adults: ["大人g1", "大人h1"], children: ["小孩gh1-1", "小孩gh1-2"] }
        ];

        let selectedGroup = "";
        let selectedFamilyId = "";

        // 點選「組別」
        function selectGroup(groupName) {
            selectedGroup = groupName;
            selectedFamilyId = ""; // 切換組別時重置家庭
            
            // 切換組別按鈕高亮
            document.querySelectorAll('.group-btn').forEach(btn => {
                if (btn.innerText === groupName) {
                    btn.className = "group-btn py-3 text-center bg-indigo-600 text-white font-bold rounded-xl shadow-md transition-all text-sm";
                } else {
                    btn.className = "group-btn py-3 text-center bg-gray-50 hover:bg-indigo-50 text-gray-700 font-semibold rounded-xl border border-gray-200 transition-all text-sm";
                }
            });

            // 動態產生該組別「所有家庭的大人」按鈕
            const adultContainer = document.getElementById('adultContainer');
            adultContainer.innerHTML = '';
            
            const filtered = dbData.filter(item => item.group === groupName);
            filtered.forEach(family => {
                family.adults.forEach(adult => {
                    adultContainer.innerHTML += `
                        <div class="relative">
                            <input type="checkbox" id="${adult}" value="${adult}" data-family="${family.familyId}" onchange="toggleAdult(this)" class="custom-check adult-cb">
                            <label for="${adult}" class="check-label block text-center py-3 px-2 bg-gray-50 border border-gray-200 rounded-xl font-medium text-sm text-gray-700 cursor-pointer transition-all truncate">
                                ${adult}
                            </label>
                        </div>
                    `;
                });
            });

            document.getElementById('stepAdult').classList.remove('hidden');
            document.getElementById('stepChildren').classList.add('hidden');
            document.getElementById('summarySection').classList.add('hidden');
        }

        // 點選「大人」按鈕
        function toggleAdult(checkbox) {
            const familyId = checkbox.dataset.family;

            if (checkbox.checked) {
                // 如果是新選的家庭，鎖定該家庭，並把「其他家庭」的大人取消勾選
                if (selectedFamilyId !== familyId) {
                    selectedFamilyId = familyId;
                    document.querySelectorAll('.adult-cb').forEach(cb => {
                        if (cb.dataset.family !== familyId) cb.checked = false;
                    });
                    // 更新小孩按鈕
                    renderChildren(familyId);
                }
            } else {
                // 如果把大人都取消勾選了，就隱藏後面步驟
                const anyAdultChecked = Array.from(document.querySelectorAll('.adult-cb')).some(cb => cb.checked);
                if (!anyAdultChecked) {
                    selectedFamilyId = "";
                    document.getElementById('stepChildren').classList.add('hidden');
                    document.getElementById('summarySection').classList.add('hidden');
                    return;
                }
            }
            updateSummary();
        }

        // 動態生成小孩按鈕
        function renderChildren(familyId) {
            const childrenContainer = document.getElementById('childrenContainer');
            childrenContainer.innerHTML = '';
            
            const family = dbData.find(item => item.familyId === familyId);
            
            if (family && family.children.length > 0) {
                family.children.forEach(child => {
                    childrenContainer.innerHTML += `
                        <div class="relative">
                            <input type="checkbox" id="${child}" value="${child}" onchange="updateSummary()" class="custom-check child-cb">
                            <label for="${child}" class="check-label block text-center py-3 px-2 bg-gray-50 border border-gray-200 rounded-xl font-medium text-sm text-gray-700 cursor-pointer transition-all truncate">
                                ${child}
                            </label>
                        </div>
                    `;
                });
                document.getElementById('stepChildren').classList.remove('hidden');
            } else {
                // 沒小孩就直接隱藏第三步
                document.getElementById('stepChildren').classList.add('hidden');
            }
            document.getElementById('summarySection').classList.remove('hidden');
        }

        // 隨時更新底部文字狀態
        function updateSummary() {
            const selectedMembers = [];
            
            // 抓勾選的大人
            document.querySelectorAll('.adult-cb:checked').forEach(cb => selectedMembers.push(cb.value));
            // 抓勾選的小孩
            document.querySelectorAll('.child-cb:checked').forEach(cb => selectedMembers.push(cb.value));

            const outputDiv = document.getElementById('finalOutput');
            
            if (selectedMembers.length === 0) {
                outputDiv.innerText = "請至少勾選一名成員";
                return;
            }
            
            outputDiv.innerText = `[${selectedGroup}組] ${selectedMembers.join(', ')}`;
        }

        // 送出資料到 GAS 的函式
        function submitData() {
            // 這裡對接你原本寫好的 fetch(GAS_URL) 邏輯即可
            const finalResult = document.getElementById('finalOutput').innerText;
            alert("準備送出：\n" + finalResult);
        }
    </script>
</body>
</html>
