<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 簽到表單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <!-- 顯示 LINE 頭像 -->
        <div class="flex flex-col items-center mb-4">
            <img id="avatar" class="w-20 h-20 rounded-full border-4 border-indigo-500 hidden" src="" alt="LINE Avatar">
            <p id="welcomeMsg" class="text-sm text-gray-500 mt-2">正在載入 LINE 身分...</p>
        </div>

        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">用戶資料登記</h2>
        
        <form id="dataForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">自然名 (同步 LINE 帳號)</label>
                <!-- 設定為 readonly 可以防止使用者改掉讀取到的 LINE 名字，若想讓他們改就把 readonly 拿掉 -->
                <input type="text" id="name" required readonly class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm bg-gray-50 focus:outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">其他成員簽到</label>
                <input type="text" id="address" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button type="submit" id="submitBtn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                送出資料
            </button>
        </form>

        <div id="successMsg" class="hidden mt-4 p-4 bg-green-100 text-green-700 rounded-md text-center">
            填寫成功！即將關閉視窗...
        </div>
    </div>

    <script>
        const GAS_URL = "1L6stB2kVhtUpqQ2SG61AKewJTmybMHpHxxj8Hn18Ai8"; //
        const MY_LIFF_ID = "2010564032-WDkJGtJu"; // ⚠️ 注意：只要填寫 LIFF URL 後面那串 XXXXX-XXXXX 即可

        // 初始化 LIFF
        async function initializeLiff() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    // 如果用戶不是在 LINE 內開啟（例如用一般瀏覽器），強制引導登入 LINE
                    liff.login();
                } else {
                    // 獲取用戶資料
                    const profile = await liff.getProfile();
                    
                    // 將資料渲染到 UI 上
                    document.getElementById('name').value = profile.displayName;
                    document.getElementById('avatar').src = profile.pictureUrl;
                    document.getElementById('avatar').classList.remove('hidden');
                    document.getElementById('welcomeMsg').innerText = `嗨，${profile.displayName}！請填寫下方資料`;
                }
            } catch (error) {
                console.error("LIFF 初始化失敗", error);
                document.getElementById('welcomeMsg').innerText = "無法讀取 LINE 身分，請於 LINE 內開啟。";
            }
        }

        // 執行初始化
        initializeLiff();

        // 表單送出事件
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMsg');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "資料傳送中...";

            const payload = {
                name: document.getElementById('name').value,
                address: document.getElementById('address').value
            };

            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    successMsg.classList.remove('hidden');
                    document.getElementById('dataForm').reset();
                    
                    // 寫入成功後，2 秒後直接幫使用者「自動關閉 LIFF 視窗」返回聊天室，體驗極佳！
                    setTimeout(() => {
                        liff.closeWindow();
                    }, 2000);
                } else {
                    alert("錯誤: " + data.message);
                    submitBtn.disabled = false;
                    submitBtn.innerText = "重新送出";
                }
            })
            .catch(error => {
                alert("連線失敗");
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
