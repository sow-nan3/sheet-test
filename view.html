<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查看資料庫資料</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">Google Sheet 資料列表</h2>
            <a href="index.html" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 text-sm">返回填寫表單</a>
        </div>

        <div id="loading" class="text-center py-4 text-gray-500">資料載入中，請稍候...</div>

        <div class="overflow-x-auto shadow border-b border-gray-200 sm:rounded-lg hidden" id="tableContainer">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">時間</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">姓名</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">地址</th>
                    </tr>
                </thead>
                <tbody id="dataBody" class="bg-white divide-y divide-gray-200">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // ⚠️ 請替換成你剛剛複製的 GAS 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzbdOG84fNcpfaY2XWu0k9AGwG69dRDPt4jayBd3_2AgmMviDysOvBLS7S8XmHy49CJ9A/exec";

        // 頁面載入後自動執行
        window.onload = function() {
            fetch(GAS_URL)
            .then(response => response.json())
            .then(data => {
                const loading = document.getElementById('loading');
                const tableContainer = document.getElementById('tableContainer');
                const dataBody = document.getElementById('dataBody');
                
                loading.classList.add('hidden');
                tableContainer.classList.remove('hidden');
                
                if(data.length === 0) {
                    dataBody.innerHTML = `<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">目前尚無資料</td></tr>`;
                    return;
                }

                // 渲染資料
                let htmlRows = "";
                data.forEach(item => {
                    htmlRows += `
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.時間 || ''}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${item.姓名 || ''}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.地址 || ''}</td>
                        </tr>
                    `;
                });
                dataBody.innerHTML = htmlRows;
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById('loading').innerText = "資料載入失敗，請檢查後端 GAS 設定。";
            });
        }
    </script>
</body>
</html>
